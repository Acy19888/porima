<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Porima · Amazon Market Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0d0f14; --bg2:#11141b; --panel:#161a23; --panel2:#1b202b;
    --border:#262c39; --border2:#323a4a;
    --txt:#e9ecf2; --muted:#98a2b5; --muted2:#6c7689;
    --gold:#d8b15a; --gold2:#eccd7e; --teal:#46c7ac; --blue:#5aa9e6;
    --red:#e06b6b; --green:#5fcf80; --shadow:0 10px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#1a1f2b 0,var(--bg) 55%);
    color:var(--txt);font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--gold2);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1320px;margin:0 auto;padding:28px 26px 80px;display:none}
  .logo-img{height:46px;border-radius:11px;display:block}
  /* login */
  #login{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;
    background:radial-gradient(900px 500px at 50% 0,#1a1f2b 0,#0a0c10 60%)}
  .login-card{width:340px;background:linear-gradient(160deg,var(--panel) 0,var(--bg2) 100%);
    border:1px solid var(--border2);border-radius:18px;padding:30px 28px;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
  .login-card img{height:54px;margin-bottom:6px}
  .login-card .sub{color:var(--muted);font-size:12.5px;margin-bottom:22px}
  .login-card input{width:100%;margin-bottom:11px;padding:11px 13px}
  .login-card button{width:100%;padding:12px;border:0;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;
    background:linear-gradient(135deg,var(--gold) 0,#c49a44 100%);color:#1a1206;margin-top:4px}
  .login-card button:hover{filter:brightness(1.06)}
  .login-err{color:var(--red);font-size:12.5px;min-height:18px;margin-top:8px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--gold) 0,#b8923f 100%);color:#1a1206;font-weight:800;font-size:20px;
    box-shadow:0 6px 20px rgba(216,177,90,.3)}
  .brand h1{font-size:19px;margin:0;letter-spacing:.2px;font-weight:700}
  .brand p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
  .topright{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .lang{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:4px}
  .lang button{padding:6px 12px;border-radius:7px;cursor:pointer;color:var(--muted);font-weight:700;font-size:12px;border:0;background:none}
  .lang button.active{background:var(--panel2);color:var(--gold2);border:1px solid var(--border2)}
  .tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:5px;flex-wrap:wrap}
  .tab{padding:9px 16px;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:600;font-size:13px;border:0;background:none;white-space:nowrap}
  .tab.active{background:linear-gradient(135deg,var(--gold) 0,#c49a44 100%);color:#1a1206;box-shadow:0 4px 14px rgba(216,177,90,.25)}
  .view{display:none}
  .view.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:linear-gradient(160deg,var(--panel) 0,var(--bg2) 100%);border:1px solid var(--border);
    border-radius:14px;padding:18px 18px 16px;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;left:0;top:0;height:3px;width:100%;
    background:linear-gradient(90deg,var(--gold),transparent)}
  .kpi .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .kpi .val{font-size:25px;font-weight:780;margin-top:6px;letter-spacing:-.3px}
  .kpi .sub{color:var(--muted2);font-size:11.5px;margin-top:3px}

  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:var(--panel);
    border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:20px}
  .fld{display:flex;flex-direction:column;gap:6px}
  .fld label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  select,input{background:var(--panel2);border:1px solid var(--border2);color:var(--txt);
    border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit;outline:none;min-width:120px}
  select:focus,input:focus{border-color:var(--gold)}
  .reset{margin-left:auto;background:var(--panel2);border:1px solid var(--border2);color:var(--muted);
    padding:9px 14px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;align-self:flex-end}
  .reset:hover{color:var(--txt);border-color:var(--gold)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .card{background:linear-gradient(160deg,var(--panel) 0,var(--bg2) 100%);border:1px solid var(--border);
    border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:15px;font-weight:700}
  .card .hint{color:var(--muted2);font-size:12px;margin:0 0 16px}
  .chart-box{position:relative;height:300px}
  .span2{grid-column:1 / -1}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 9px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--gold2)}
  tbody tr:hover{background:rgba(216,177,90,.05)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .rank{color:var(--gold2);font-weight:700}
  .tt{color:var(--txt);max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}

  .calc{display:grid;grid-template-columns:1.05fr 1fr;gap:18px}
  .calc .inputs .row{display:grid;grid-template-columns:1fr 130px;gap:10px;align-items:center;margin-bottom:11px}
  .calc .inputs .row label{font-size:13px;color:var(--muted)}
  .calc .inputs .row .unit{color:var(--muted2);font-size:11px}
  .calc input,.calc select{width:100%}
  .sect-h{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--gold2);font-weight:700;
    margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .sect-h:first-child{margin-top:0}
  .res-hero{background:linear-gradient(135deg,#1d2330 0,#161a23 100%);border:1px solid var(--border2);
    border-radius:14px;padding:20px;margin-bottom:14px;text-align:center}
  .res-hero .big{font-size:38px;font-weight:800;letter-spacing:-1px}
  .res-hero .big.good{color:var(--green)} .res-hero .big.bad{color:var(--red)}
  .res-hero .cap{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .badge{display:inline-block;margin-top:10px;padding:5px 14px;border-radius:20px;font-size:12.5px;font-weight:700}
  .badge.good{background:rgba(95,207,128,.15);color:var(--green);border:1px solid rgba(95,207,128,.3)}
  .badge.bad{background:rgba(224,107,107,.15);color:var(--red);border:1px solid rgba(224,107,107,.3)}
  .ek-box{background:linear-gradient(135deg,#2a2417 0,#1b1a14 100%);border:1px solid var(--gold);
    border-radius:14px;padding:18px 20px;margin-bottom:14px;text-align:center}
  .ek-box .big{font-size:32px;font-weight:800;color:var(--gold2);letter-spacing:-.5px}
  .ek-box .cap{color:var(--gold2);font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .ek-box .sub{color:var(--muted);font-size:11.5px;margin-top:4px}
  .res-list{display:flex;flex-direction:column;gap:1px}
  .res-list .li{display:flex;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13.5px}
  .res-list .li .v{font-weight:700;font-variant-numeric:tabular-nums}
  .res-list .li.tot{border-top:2px solid var(--border2);border-bottom:0;margin-top:4px;padding-top:13px;font-size:15px}
  .res-list .li.cost .v{color:#f0a3a3}
  .res-list .li.rev .v{color:var(--teal)}
  .note{font-size:12px;color:var(--muted2);margin-top:14px;line-height:1.6}
  .mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .mini{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:14px}
  .mini .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .mini .v{font-size:20px;font-weight:780;margin-top:4px}

  .sugg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
  .swatch{width:14px;height:14px;border-radius:4px;display:inline-block;vertical-align:-2px;margin-right:7px;border:1px solid rgba(255,255,255,.15)}
  .recobar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .reco{flex:1;min-width:220px;background:linear-gradient(160deg,#1d2330,#161a23);border:1px solid var(--border2);border-radius:14px;padding:16px 18px}
  .reco .t{color:var(--gold2);font-weight:700;font-size:14px;margin-bottom:8px}
  .reco .b{font-size:12.5px;color:var(--muted);line-height:1.6}
  .reco .b b{color:var(--txt)}

  .fc-controls{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .fc-controls .fld input{min-width:90px;width:110px}
  .chk{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
  .chk label{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer}
  .chk input{min-width:auto;width:auto}
  .foot{color:var(--muted2);font-size:11.5px;text-align:center;margin-top:34px;line-height:1.7}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}.grid,.sugg-grid,.calc{grid-template-columns:1fr}}
</style>
</head>

function groupSum(rows,key){const m={};rows.forEach(r=>{const k=r[key];if(!m[k])m[k]={u:0,rev:0,n:0};m[k].u+=r.u;m[k].rev+=r.rev;m[k].n++;});return m;}

let sortKey='u', sortDir=-1;
function filtered(){
  const mat=$('#fMaterial').value,ty=$('#fType').value,b=$('#fBrand').value,c=$('#fColor').value,pk=$('#fPack').value,q=$('#fSearch').value.toLowerCase().trim();
  return RAW.filter(r=>(!mat||r.m===mat)&&(!ty||r.t===ty)&&(!b||r.b===b)&&(!c||r.c===c)&&(!pk||r.pack===pk)&&(!q||r.title.toLowerCase().includes(q)));
}
function topColor(rows){const m=groupSum(rows,'c');let best='',bu=-1;for(const c in m)if(m[c].u>bu){bu=m[c].u;best=c;}return best||'–';}
function renderKpis(rows){
  const u=rows.reduce((a,r)=>a+r.u,0),rev=rows.reduce((a,r)=>a+r.rev,0);
  const wprice=rows.reduce((a,r)=>a+(r.p||0)*r.u,0)/(u||1);
  const brands=new Set(rows.map(r=>r.b)).size;
  const k=[[t('kpi_sales'),fmt0(u),t('u_pieces')],[t('kpi_rev'),usd0(rev),t('kpi_rev_sub')],
    [t('kpi_price'),usd(wprice),t('kpi_price_sub')],[t('kpi_products'),fmt0(rows.length),brands+' '+t('brands_suffix')],
    [t('kpi_topcolor'),topColor(rows),t('kpi_topcolor_sub')]];
  $('#kpis').innerHTML=k.map(x=>`<div class="kpi"><div class="lbl">${x[0]}</div><div class="val">${x[1]}</div><div class="sub">${x[2]}</div></div>`).join('');
}
function bar(id,labels,datasets,horizontal,dualAxis){
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart($(id),{type:'bar',data:{labels,datasets},
    options:{indexAxis:horizontal?'y':'x',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:datasets.length>1,labels:{boxWidth:12,boxHeight:12,usePointStyle:true}},
        tooltip:{callbacks:{label:c=>{const v=c.parsed[horizontal?'x':'y'];const isRev=c.dataset._rev;return c.dataset.label+': '+(isRev?usd0(v):fmt0(v)+' '+t('u_pieces'));}}}},
      scales:dualAxis?{x:{grid:{display:false}},y:{position:'left',grid:{color:'#1f2530'},ticks:{callback:v=>fmt0(v)}},y1:{position:'right',grid:{display:false},ticks:{callback:v=>usd0(v)}}}
        :{x:{grid:{color:horizontal?'#1f2530':'transparent'},ticks:{callback:function(v){return horizontal?fmt0(v):this.getLabelForValue(v);}}},
          y:{grid:{display:!horizontal,color:'#1f2530'},ticks:{callback:function(v){return horizontal?this.getLabelForValue(v):fmt0(v);}}}}}});
}
function doughnut(id,labels,vals){
  if(charts[id])charts[id].destroy();
  const tot=vals.reduce((a,b)=>a+b,0);
  charts[id]=new Chart($(id),{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:SERIES,borderColor:'#11141b',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{boxWidth:12,usePointStyle:true,padding:12}},
        tooltip:{callbacks:{label:c=>c.label+': '+usd0(c.parsed)+' ('+Math.round(c.parsed/tot*100)+'%)'}}}}});
}
function stackedBar(id,labels,datasets){
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart($(id),{type:'bar',data:{labels,datasets},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:12,boxHeight:12,usePointStyle:true}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt0(c.parsed.x)+' '+t('u_pieces')}}},
      scales:{x:{stacked:true,grid:{color:'#1f2530'},ticks:{callback:v=>fmt0(v)}},y:{stacked:true,grid:{display:false}}}}});
}
function renderCharts(rows){
  const mmv=groupSum(rows,'m');const mlv=Object.keys(mmv).sort((a,b)=>mmv[a].u-mmv[b].u);
  bar('#cMaterial',mlv,[{label:t('lg_pieces'),data:mlv.map(k=>mmv[k].u),backgroundColor:mlv.map(k=>MATERIALCOLOR[k]||PAL.grey),borderRadius:5,yAxisID:'y',order:2},
    {label:t('lg_rev'),_rev:1,type:'line',data:mlv.map(k=>mmv[k].rev),borderColor:PAL.gold,backgroundColor:PAL.gold,tension:.3,yAxisID:'y1',order:1,pointRadius:4}],false,true);
  const mt=groupSum(rows,'t');const tl=Object.keys(mt).sort((a,b)=>mt[a].u-mt[b].u);
  bar('#cType',tl,[{label:t('lg_pieces'),data:tl.map(k=>mt[k].u),backgroundColor:PAL.gold,borderRadius:5,yAxisID:'y',order:2},
    {label:t('lg_rev'),_rev:1,type:'line',data:tl.map(k=>mt[k].rev),borderColor:PAL.teal,backgroundColor:PAL.teal,tension:.3,yAxisID:'y1',order:1,pointRadius:4}],false,true);
  const mb=groupSum(rows,'b');const bl=Object.keys(mb).sort((a,b)=>mb[a].u-mb[b].u);
  bar('#cBrand',bl,[{label:t('lg_pieces'),data:bl.map(k=>mb[k].u),backgroundColor:PAL.blue,borderRadius:5,yAxisID:'y',order:2},
    {label:t('lg_rev'),_rev:1,type:'line',data:bl.map(k=>mb[k].rev),borderColor:PAL.gold,backgroundColor:PAL.gold,tension:.3,yAxisID:'y1',order:1,pointRadius:4}],false,true);
  const mc=groupSum(rows,'c');const cl=Object.keys(mc).sort((a,b)=>mc[b].u-mc[a].u).slice(0,12).reverse();
  const typesPresent=[...new Set(rows.map(r=>r.t))].sort((a,b)=>(mt[b]?mt[b].u:0)-(mt[a]?mt[a].u:0));
  const ct={};rows.forEach(r=>{if(!ct[r.c])ct[r.c]={};ct[r.c][r.t]=(ct[r.c][r.t]||0)+r.u;});
  const dsets=typesPresent.map(ty=>({label:ty.replace('PLA ',''),data:cl.map(c=>(ct[c]&&ct[c][ty])||0),backgroundColor:TYPECOLOR[ty]||PAL.grey,borderWidth:0}));
  stackedBar('#cColor',cl,dsets);
  const sl=Object.keys(mmv).sort((a,b)=>mmv[b].rev-mmv[a].rev);
  doughnut('#cShare',sl,sl.map(k=>mmv[k].rev));
}

const NUM=id=>parseFloat($(id).value)||0;
const types=Object.keys(D.medianPrice);
function fillCalcSelects(){
  $('#iType').innerHTML=types.map(x=>`<option>${x}</option>`).join('');

function setCalcDefaults(){
  const ty=$('#iType').value||types[0];
  $('#iPrice').value=D.medianPrice[ty]||20;
  $('#iFba').value=D.fba;$('#iTariff').value=D.tariff;$('#iBroker').value=D.broker;$('#iDrayage').value=D.drayage;
  $('#iReferral').value=D.referral;$('#iPpc').value=D.ppc;$('#iReturns').value=D.returns;$('#iStorage').value=D.storage;
  $('#iFreight').value=D.freight[$('#iFreightOpt').value].pu;
}
function recEk(){
  const price=NUM('#iPrice'),target=NUM('#iTarget');
  const contUnits=D.freight[$('#iFreightOpt').value].units, freight=NUM('#iFreight');
  const logiPU=(NUM('#iBroker')+NUM('#iDrayage'))/contUnits;
  const pctVar=(NUM('#iReferral')+NUM('#iPpc')+NUM('#iReturns'))/100;
  const fixedNonEk=freight+logiPU+NUM('#iFba')+NUM('#iStorage');
  return (price*(1-pctVar)-price*target/100-fixedNonEk)/(1+NUM('#iTariff')/100);
}
function applyRecEk(){const m=recEk();$('#iEk').value=(m>0?m:0).toFixed(2);}
function calc(){
  const price=NUM('#iPrice'),ek=NUM('#iEk'),qty=NUM('#iQty'),target=NUM('#iTarget');
  const contUnits=D.freight[$('#iFreightOpt').value].units, freight=NUM('#iFreight');
  const duty=ek*NUM('#iTariff')/100, logiPU=(NUM('#iBroker')+NUM('#iDrayage'))/contUnits;
  const landed=ek+freight+duty+logiPU;
  const referral=price*NUM('#iReferral')/100, fba=NUM('#iFba'), ppc=price*NUM('#iPpc')/100, returns=price*NUM('#iReturns')/100, storage=NUM('#iStorage');
  const totalCost=landed+referral+fba+ppc+returns+storage, profit=price-totalCost;
  const margin=price>0?profit/price*100:0, roi=landed>0?profit/landed*100:0;

  $('#rMargin').textContent=pct(margin);$('#rMargin').className='big '+(margin>=target?'good':'bad');
  $('#rBadge').innerHTML=margin>=target?`<span class="badge good">${t('badge_ok').replace('{x}',target)}</span>`:`<span class="badge bad">${t('badge_bad').replace('{x}',target)}</span>`;
  $('#rProfitU').textContent=usd(profit);$('#rProfitU').style.color=profit>=0?'var(--green)':'var(--red)';
  $('#rProfitM').textContent=usd0(profit*qty);
  $('#rLanded').textContent=usd(landed);$('#rRoi').textContent=fmt0(roi)+'%';
  $('#rList').innerHTML=[['rev',t('li_price'),usd(price)],['cost',t('li_ek'),usd(ek)],['cost',t('li_freight'),usd(freight)],
    ['cost',t('li_duty')+' ('+NUM('#iTariff')+'%)',usd(duty)],['cost',t('li_logi'),usd(logiPU)],['cost',t('li_referral'),usd(referral)],
    ['cost',t('li_fba'),usd(fba)],['cost',t('li_ppc'),usd(ppc)],['cost',t('li_returns'),usd(returns)],['cost',t('li_storage'),usd(storage)],
    ['tot',t('li_profit'),usd(profit)]].map(x=>`<div class="li ${x[0]}"><span>${x[1]}</span><span class="v">${x[2]}</span></div>`).join('');

  // reverse: max EK Porima must give for target margin at this price & costs
  const pctVar=(NUM('#iReferral')+NUM('#iPpc')+NUM('#iReturns'))/100;
  const fixedNonEk=freight+logiPU+fba+storage;
  const maxEk=(price*(1-pctVar)-price*target/100-fixedNonEk)/(1+NUM('#iTariff')/100);
  if(maxEk>0){$('#rEk').textContent=usd(maxEk);$('#rEkSub').textContent=t('ek_ok').replace('{x}',target);}
  else{$('#rEk').textContent='–';$('#rEkSub').textContent=t('ek_bad').replace('{x}',target);}
}

function buildTypeChecks(){
  $('#qTypes').innerHTML='<span style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;align-self:center">'+t('fc_types')+':</span>'+
    types.map(ty=>{const on=(ty==='PLA Pro/Plus'||ty==='PLA Silk')?'checked':'';
      return `<label><input type="checkbox" class="qType" value="${ty}" ${on}> ${ty}</label>`;}).join('');
  document.querySelectorAll('.qType').forEach(c=>c.addEventListener('change',()=>{setForecastProfitDefault();forecast();}));
}
function includedTypes(){return [...document.querySelectorAll('.qType:checked')].map(c=>c.value);}
function setForecastProfitDefault(){
  // default profit/spool from market median of included types and default costs at EK 3.50
  const inc=includedTypes();if(!inc.length){return;}
  let pu=0,wu=0;inc.forEach(ty=>{const u=D.segKg[ty]||0;pu+=(D.medianPrice[ty]||0)*u;wu+=u;});
  const price=wu?pu/wu:20, ek=3.50;
  const landed=ek+D.freight.opt1_40.pu+ek*D.tariff/100+(D.broker+D.drayage)/D.freight.opt1_40.units;
  const cost=landed+price*D.referral/100+D.fba+price*D.ppc/100+price*D.returns/100+D.storage;
  $('#qProfit').value=(price-cost).toFixed(2);
}
function forecast(){
  const inc=includedTypes();
  const baseUnits=inc.reduce((a,ty)=>a+(D.segKg[ty]||0),0);
  let pu=0,wu=0;inc.forEach(ty=>{const u=D.segKg[ty]||0;pu+=(D.medianPrice[ty]||0)*u;wu+=u;});
  const avgPrice=wu?pu/wu:0;
  const share=NUM('#qShare')/100, mat=Math.max(NUM('#qMat'),1), growth=NUM('#qGrowth')/100, profitU=NUM('#qProfit');
  const steep=6/mat, mid=mat/2;
  const labels=[],units=[],revenue=[],cumProfit=[];let cum=0,totU=0,totR=0,totP=0;
  for(let m=1;m<=24;m++){
    const s=share/(1+Math.exp(-steep*(m-mid)));
    const grown=baseUnits*Math.pow(1+growth,(m-1)/12);
    const u=grown*s, r=u*avgPrice, p=u*profitU;
    cum+=p;totU+=u;totR+=r;totP+=p;
    labels.push('M'+m);units.push(u);revenue.push(r);cumProfit.push(cum);
  }
  const runProfit=units[23]*profitU;
  const kp=[[t('fc_kpi_units'),fmt0(totU),t('u_pieces')],[t('fc_kpi_rev'),usd0(totR),''],
    [t('fc_kpi_profit'),usd0(totP),''],[t('fc_kpi_run'),usd0(runProfit),'M24']];
  $('#fcKpis').innerHTML=kp.map(x=>`<div class="kpi"><div class="lbl">${x[0]}</div><div class="val">${x[1]}</div><div class="sub">${x[2]}</div></div>`).join('');
  if(charts['#cFc'])charts['#cFc'].destroy();
  charts['#cFc']=new Chart($('#cFc'),{data:{labels,datasets:[
    {type:'bar',label:t('fc_lg_units'),data:units,backgroundColor:PAL.gold,borderRadius:4,yAxisID:'y',order:2},
    {type:'line',label:t('fc_lg_profit'),_rev:1,data:cumProfit,borderColor:PAL.teal,backgroundColor:'rgba(70,199,172,.1)',fill:true,tension:.35,yAxisID:'y1',order:1,pointRadius:0}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{boxWidth:12,usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset._rev?c.dataset.label+': '+usd0(c.parsed.y):c.dataset.label+': '+fmt0(c.parsed.y)+' '+t('u_pieces')}}},
    scales:{x:{grid:{display:false}},y:{position:'left',grid:{color:'#1f2530'},ticks:{callback:v=>fmt0(v)}},y1:{position:'right',grid:{display:false},ticks:{callback:v=>usd0(v)}}}}});
}

function rerenderActive(){
  const v=document.querySelector('.tab.active').dataset.view;
  if(v==='dash')renderDash();else if(v==='calc')calc();else if(v==='sugg')renderSugg();else if(v==='fc')forecast();else if(v==='kw')renderKeywords();else if(v==='market')renderMarket();
}
function setLang(l){lang=l;applyI18n();
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  fillSel('#fMaterial',uniq('m'));fillSel('#fType',uniq('t'));fillSel('#fBrand',uniq('b'));fillSel('#fColor',uniq('c'));fillPack();kwFillCat();
  buildTypeChecks();setForecastProfitDefault();
  renderDash();renderSugg();calc();forecast();renderKeywords();renderMarket();
}
document.querySelectorAll('.lang button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
document.querySelectorAll('.tab').forEach(tb=>tb.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  tb.classList.add('active');$('#'+tb.dataset.view).classList.add('active');rerenderActive();
});
['#fMaterial','#fType','#fBrand','#fColor','#fPack','#fSearch'].forEach(id=>$(id).addEventListener('input',renderDash));
$('#reset').onclick=()=>{['#fMaterial','#fType','#fBrand','#fColor','#fPack','#fSearch'].forEach(id=>$(id).value='');renderDash();};
['#mGlobal','#mCagr','#mNa'].forEach(id=>$(id).addEventListener('input',renderMarket));
['#kCat','#kSearch'].forEach(id=>$(id).addEventListener('input',renderKeywords));$('#kHideBrand').addEventListener('change',renderKeywords);
$('#iType').addEventListener('change',()=>{$('#iPrice').value=D.medianPrice[$('#iType').value]||20;applyRecEk();calc();});
$('#iFreightOpt').addEventListener('change',()=>{$('#iFreight').value=D.freight[$('#iFreightOpt').value].pu;calc();});
document.querySelectorAll('#calc input,#calc select').forEach(el=>el.addEventListener('input',calc));
['#qShare','#qMat','#qGrowth','#qProfit'].forEach(id=>$(id).addEventListener('input',forecast));

// init
let booted=false;
function boot(){
  if(booted)return;booted=true;
  fillSel('#fMaterial',uniq('m'));fillSel('#fType',uniq('t'));fillSel('#fBrand',uniq('b'));fillSel('#fColor',uniq('c'));fillPack();
  fillCalcSelects();setCalcDefaults();applyRecEk();
  buildTypeChecks();setForecastProfitDefault();
  $('#mGlobal').value=D.market.global2025;$('#mCagr').value=D.market.cagr;$('#mNa').value=D.market.naShare;
  kwFillCat();
  renderDash();renderSugg();calc();forecast();renderKeywords();renderMarket();
}
applyI18n();
function tryLogin(){
  const u=$('#lgUser').value.trim().toLowerCase(), p=$('#lgPass').value;
  if(u==='porima'&&p==='porima1234'){$('#login').style.display='none';document.querySelector('.wrap').style.display='block';boot();}
  else{$('#lgErr').textContent=lang==='tr'?'Kullanıcı adı veya şifre hatalı':'Benutzername oder Passwort falsch';}
}
$('#lgBtn').onclick=tryLogin;
['#lgUser','#lgPass'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();}));
$('#lgUser').focus();
</script>
</body>
</html>
